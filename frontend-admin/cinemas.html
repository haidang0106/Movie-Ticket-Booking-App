<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAdmin - Quản lý Rạp Phim</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/movies.css"> <!-- Tái sử dụng một số CSS Modal/Buttons -->
  <link rel="stylesheet" href="./css/cinemas.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon">
            <i data-lucide="menu"></i>
          </button>
          <h2>Mạng lưới Rạp & Phòng chiếu</h2>
        </div>
        <div class="header-right">
          <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=E50914&color=fff" alt="Admin" class="avatar">
            <div class="user-info">
              <span class="user-name">Quản trị viên</span>
              <span class="user-role">Super Admin</span>
            </div>
          </div>
        </div>
      </header>

      <div class="content-wrapper">
        <div class="two-pane-layout">
          
          <!-- LỀ TRÁI: DANH SÁCH CỤM RẠP -->
          <div class="pane-left">
            <div class="pane-header">
              <h3>Danh sách Cụm Rạp</h3>
              <button class="btn-icon-sub" title="Thêm Cụm rạp mới" onclick="alert('Mở form thêm cụm rạp')">
                <i data-lucide="plus"></i>
              </button>
            </div>
            
            <div class="cinema-list" id="cinema-list-container">
              <!-- Render by JS -->
            </div>
          </div>

          <!-- LỀ PHẢI: CHI TIẾT VÀ PHÒNG CHIẾU -->
          <div class="pane-right">
            
            <!-- Trạng thái trống (Chưa chọn rạp) -->
            <div class="empty-state" id="empty-state">
              <i data-lucide="building-2"></i>
              <h3>Chọn một cụm rạp</h3>
              <p>Chọn rạp từ danh sách bên trái để xem và quản lý phòng chiếu.</p>
            </div>

            <!-- Giao diện chi tiết rạp được chọn -->
            <div class="detail-view" id="detail-view">
              
              <div class="detail-header">
                <div class="detail-header-top">
                  <div class="detail-title" id="selected-cinema-name">Tên Rạp</div>
                  <div class="detail-actions">
                    <button class="btn-secondary" onclick="alert('Mở form sửa rạp')">Sửa thông tin</button>
                    <button class="btn-secondary" style="color:var(--color-danger)" onclick="alert('Xóa rạp')">Xóa rạp</button>
                  </div>
                </div>
                <div class="text-secondary" id="selected-cinema-address">
                  <i data-lucide="map-pin" style="width:14px; display:inline-block; vertical-align:middle;"></i>
                  <span>Địa chỉ rạp</span>
                </div>
              </div>

              <div class="halls-content">
                <div class="halls-header">
                  <h3>Danh sách Phòng chiếu (<span id="halls-count">0</span>)</h3>
                  <button class="btn-primary" onclick="alert('Thêm phòng chiếu mới')">
                    <i data-lucide="plus"></i> Thêm Phòng
                  </button>
                </div>

                <div class="halls-grid" id="halls-grid-container">
                  <!-- Render Halls by JS -->
                </div>
              </div>

            </div>

          </div> <!-- End Pane Right -->

        </div>
      </div>
    </main>
  </div>

  <script src="./js/services/api.js"></script>
  <script src="./js/components/sidebar.js"></script>
  <script src="./js/pages/cinemas.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
