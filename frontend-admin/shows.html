<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAdmin - Quản lý Suất chiếu</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/movies.css"> <!-- Reused Table/Modal CSS -->
  <link rel="stylesheet" href="./css/shows.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon">
            <i data-lucide="menu"></i>
          </button>
          <h2>Lịch chiếu Phim</h2>
        </div>
        <div class="header-right">
          <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=E50914&color=fff" alt="Admin" class="avatar">
            <div class="user-info">
              <span class="user-name">Quản trị viên</span>
              <span class="user-role">Super Admin</span>
            </div>
          </div>
        </div>
      </header>

      <div class="content-wrapper">
        <div class="page-header">
          <h1 class="page-title">Quản lý Suất chiếu</h1>
          <div class="page-actions">
            <div class="view-switcher">
              <div class="view-btn active" id="view-list-btn" title="Chế độ Bảng">
                <i data-lucide="list"></i>
              </div>
              <div class="view-btn" id="view-grid-btn" title="Chế độ Timeline">
                <i data-lucide="layout-grid"></i>
              </div>
            </div>
            <button class="btn-primary" id="btn-add-show">
              <i data-lucide="plus"></i>
              <span>Tạo Suất Chiếu</span>
            </button>
          </div>
        </div>

        <!-- Controls / Filters -->
        <div class="shows-controls">
          <div class="control-group">
            <label>Cụm rạp</label>
            <select class="form-control" id="filter-cinema">
              <option value="1">CineAdmin Metropolis</option>
              <option value="2">CineAdmin Landmark 81</option>
            </select>
          </div>
          <div class="control-group">
            <label>Phòng chiếu</label>
            <select class="form-control" id="filter-hall">
              <option value="all">Tất cả phòng</option>
            </select>
          </div>
          <div class="control-group">
            <label>Ngày chiếu</label>
            <input type="date" class="form-control" id="filter-date" value="2026-04-20">
          </div>
          <button class="btn-secondary" id="btn-reset-filters" style="margin-bottom: 2px;">Đặt lại</button>
        </div>

        <!-- LIST VIEW -->
        <div class="shows-list-view" id="shows-list-view">
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Giờ chiếu</th>
                  <th>Phim</th>
                  <th>Phòng</th>
                  <th>Phụ thu</th>
                  <th>Trạng thái</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody id="shows-table-body">
                <!-- Render by JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- GRID VIEW (Timeline) -->
        <div class="shows-grid-view" id="shows-grid-view">
          <div class="timeline-grid" id="timeline-container">
            <!-- Render by JS -->
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Modal: Add Show -->
  <div class="modal-overlay" id="show-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Tạo Suất Chiếu Mới</h2>
        <button class="btn-close" id="btn-close-modal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body">
        <form id="show-form">
          <div class="form-group">
            <label>Chọn Phim</label>
            <select class="form-control" id="input-movie" required>
              <!-- Options by JS -->
            </select>
          </div>
          
          <div class="row">
            <div class="col form-group">
              <label>Phòng chiếu</label>
              <select class="form-control" id="input-hall" required>
                <!-- Options items from selected cinema -->
              </select>
            </div>
            <div class="col form-group">
              <label>Giá phụ thu (đ)</label>
              <input type="number" class="form-control" placeholder="VD: 10000" id="input-surcharge" value="0">
            </div>
          </div>
          
          <div class="row">
            <div class="col form-group">
              <label>Giờ bắt đầu</label>
              <input type="datetime-local" class="form-control" id="input-start-time" required>
            </div>
            <div class="col form-group">
              <label>Thời lượng phim</label>
              <input type="text" class="form-control" id="display-duration" readonly value="--">
            </div>
          </div>

          <div class="time-preview" id="time-preview-container">
            <div class="time-preview-text">
              Dự kiến kết thúc: <span id="display-end-time" class="text-primary">--:--</span>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 5px;">
              * Đã bao gồm 15 phút thời gian dọn phòng sau suất chiếu.
            </p>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-modal">Hủy</button>
        <button class="btn-primary" id="btn-save-show">Xác nhận lịch</button>
      </div>
    </div>
  </div>

  <script src="./js/services/api.js"></script>
  <script src="./js/components/sidebar.js"></script>
  <script src="./js/components/header.js"></script>
  <script src="./js/pages/shows.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
