<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAdmin - Quản lý Phim</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/movies.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="top-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon">
            <i data-lucide="menu"></i>
          </button>
          <h2>Quản lý Phim</h2>
        </div>
        <div class="header-right">
          <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=E50914&color=fff" alt="Admin" class="avatar">
            <div class="user-info">
              <span class="user-name">Quản trị viên</span>
              <span class="user-role">Super Admin</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <div class="content-wrapper">
        <div class="page-header">
          <h1 class="page-title">Danh sách Phim</h1>
          <div class="page-actions">
            <div class="search-box">
              <i data-lucide="search"></i>
              <input type="text" class="search-input" placeholder="Tìm kiếm tên phim...">
            </div>
            <button class="btn-primary" id="btn-add-movie">
              <i data-lucide="plus"></i>
              <span>Thêm Phim Mới</span>
            </button>
          </div>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Thông tin Phim</th>
                <th>Phân loại</th>
                <th>Thời lượng</th>
                <th>Trạng thái</th>
                <th>Nổi bật</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="movie-table-body">
              <!-- Render by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Override: Add/Edit Movie -->
  <div class="modal-overlay" id="movie-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Thêm Phim Mới</h2>
        <button class="btn-close" id="btn-close-modal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body">
        <form id="movie-form">
          <div class="form-group">
            <label>Tên phim</label>
            <input type="text" class="form-control" placeholder="VD: Lật Mặt 7: Một Điều Ước" required>
          </div>
          
          <div class="row">
            <div class="col form-group">
              <label>Thể loại</label>
              <input type="text" class="form-control" placeholder="VD: Hài, Tâm Lý" required>
            </div>
            <div class="col form-group">
              <label>Thời lượng (phút)</label>
              <input type="number" class="form-control" placeholder="VD: 120" required>
            </div>
          </div>
          
          <div class="row">
            <div class="col form-group">
              <label>Ngày khởi chiếu</label>
              <input type="date" class="form-control" required>
            </div>
            <div class="col form-group">
              <label>Trạng thái</label>
              <select class="form-control">
                <option value="ACTIVE">Đang chiếu</option>
                <option value="UPCOMING">Sắp chiếu</option>
                <option value="INACTIVE">Ngừng chiếu</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label>Mô tả ngắn</label>
            <textarea class="form-control" placeholder="Tóm tắt nội dung phim..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-modal">Hủy</button>
        <button class="btn-primary" id="btn-save-movie">Lưu thông tin</button>
      </div>
    </div>
  </div>

  <script src="./js/services/api.js"></script>
  <script src="./js/components/sidebar.js"></script>
  <script src="./js/pages/movies.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
