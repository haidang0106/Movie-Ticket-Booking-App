<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAdmin - Dashboard</title>
  
  <!-- Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Main CSS -->
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/dashboard.css">
  
  <!-- Icon Library: Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Chart Library: Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar Container -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Header -->
      <header class="top-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon">
            <i data-lucide="menu"></i>
          </button>
          <h2>Dashboard</h2>
        </div>
        <div class="header-right">
          <button class="btn-icon">
            <i data-lucide="bell"></i>
            <span class="notification-badge">3</span>
          </button>
          <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin+User&background=E50914&color=fff" alt="Admin" class="avatar">
            <div class="user-info">
              <span class="user-name">Quản trị viên</span>
              <span class="user-role">Super Admin</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Dashboard Content -->
      <div class="content-wrapper">
        <!-- Stats Cards -->
        <div class="stats-grid" id="stats-container">
          <!-- Sẽ được render bằng Javascript -->
        </div>

        <!-- Charts Area -->
        <div class="charts-grid">
          <div class="chart-card">
            <div class="card-header">
              <h3>Doanh thu 7 ngày qua</h3>
              <select class="form-select">
                <option>7 ngày qua</option>
                <option>Tháng này</option>
                <option>Năm nay</option>
              </select>
            </div>
            <div class="card-body">
              <canvas id="revenueChart"></canvas>
            </div>
          </div>

          <div class="chart-card">
            <div class="card-header">
              <h3>Tỷ lệ lấp đầy ghế</h3>
            </div>
            <div class="card-body">
              <canvas id="occupancyChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="./js/services/api.js"></script>
  <script src="./js/components/sidebar.js"></script>
  <script src="./js/pages/dashboard.js"></script>
  
  <!-- Initialize Lucide Icons -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
