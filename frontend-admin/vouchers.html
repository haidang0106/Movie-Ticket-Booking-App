<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAdmin - Khuyến Mãi</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/movies.css"> <!-- Tái sử dụng Header/Modal -->
  <link rel="stylesheet" href="./css/vouchers.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside id="sidebar-container" class="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon">
            <i data-lucide="menu"></i>
          </button>
          <h2>Khuyến Mãi & Voucher</h2>
        </div>
        <div class="header-right">
          <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=E50914&color=fff" alt="Admin" class="avatar">
            <div class="user-info">
              <span class="user-name">Quản trị viên</span>
              <span class="user-role">Super Admin</span>
            </div>
          </div>
        </div>
      </header>

      <div class="content-wrapper">
        <div class="page-header">
          <h1 class="page-title">Mã Giảm Giá</h1>
          <div class="page-actions">
            <button class="btn-secondary" onclick="alert('Đã xuất Excel')">
              <i data-lucide="download"></i> Xuất Excel
            </button>
            <button class="btn-primary" id="btn-add-voucher">
              <i data-lucide="ticket"></i>
              <span>Tạo Voucher Mới</span>
            </button>
          </div>
        </div>

        <!-- Render Vouchers Here -->
        <div class="vouchers-grid" id="vouchers-grid-container">
          <!-- Rendered by JS -->
        </div>

      </div>
    </main>
  </div>

  <!-- Modal Override: Add/Edit Voucher -->
  <div class="modal-overlay" id="voucher-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Tạo Mã Giảm Giá Mới</h2>
        <button class="btn-close" id="btn-close-modal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body">
        <form id="voucher-form">
          <div class="row">
            <div class="col form-group">
              <label>Mã Khuyến Mãi (CODE)</label>
              <input type="text" class="form-control" placeholder="VD: SUMMER2026" style="text-transform: uppercase;" required>
            </div>
            <div class="col form-group">
              <label>Loại Giảm Giá</label>
              <select class="form-control">
                <option value="PERCENT">% Phần trăm thiết lập</option>
                <option value="FIXED">Giá trị VNĐ (Trực tiếp)</option>
              </select>
            </div>
          </div>
          
          <div class="row">
            <div class="col form-group">
              <label>Giá Trị Giảm</label>
              <input type="number" class="form-control" placeholder="VD: 50 (cho %)" required>
            </div>
            <div class="col form-group">
              <label>Giảm Tối Đa (VNĐ)</label>
              <input type="number" class="form-control" placeholder="VD: 50000">
            </div>
          </div>
          
          <div class="row">
            <div class="col form-group">
              <label>Ngày Bắt Đầu</label>
              <input type="date" class="form-control" required>
            </div>
            <div class="col form-group">
              <label>Ngày Hết Hạn</label>
              <input type="date" class="form-control" required>
            </div>
          </div>

          <div class="form-group">
            <label>Auto-issue (Tự động phát hành)</label>
            <div style="display:flex; gap:1rem; align-items:center; margin-top:0.5rem">
              <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
              </label>
              <span class="text-secondary" style="font-size:0.85rem">Tự động tặng khách hàng mới tạo tài khoản</span>
            </div>
          </div>
          
          <div class="form-group">
            <label>Mô tả chi tiết</label>
            <textarea class="form-control" placeholder="Nhập điều kiện áp dụng..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-modal">Hủy</button>
        <button class="btn-primary" id="btn-save-voucher">Lưu thông tin</button>
      </div>
    </div>
  </div>

  <script src="./js/services/api.js"></script>
  <script src="./js/components/sidebar.js"></script>
  <script src="./js/components/header.js"></script>
  <script src="./js/pages/vouchers.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
